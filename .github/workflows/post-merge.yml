name: Post merge Checker

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff (Checking lint, imports, complexity, and commented-out code)
        run: uv run ruff check .

      - name: Black (Checking code formatting)
        run: uv run black --check .

      - name: Interrogate (Checking docstring coverage)
        run: uv run interrogate app

      - name: Vulture (Checking unused/dead production code)
        run: uv run vulture app scripts --min-confidence 70

      - name: pip-audit (Checking known vulnerable dependencies)
        run: uv run pip-audit --ignore-vuln CVE-2025-3000

      - name: Bandit (Checking Python security issues)
        run: uv run bandit -r app -q -x app/schemas

      - name: Thin endpoint lint (Checking endpoint-layer boundaries)
        run: uv run python scripts/lint_thin_endpoints.py

      - name: Duplicate code (Checking meaningful copy-paste blocks)
        run: >-
          uvx --from pylint==3.3.8 pylint
          --disable=all
          --enable=duplicate-code
          --ignore-patterns='chat.py,companies.py,documents.py,users.py,auth.py,sessions.py'
          app tests

      - name: Pytest (Checking unit and integration tests)
        run: uv run pytest -q
